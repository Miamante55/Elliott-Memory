services:
  - type: web
    name: elliott-memory
    env: docker
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_GATEWAY_TOKEN
        generateValue: true
      - key: OMBRE_BUCKETS_DIR
        value: /var/data/buckets
      - key: OMBRE_STATE_DIR
        value: /var/data/state
      - key: OMBRE_RERANKER_ENABLED
        value: "false"
    disk:
      name: elliott-memory-data
      mountPath: /var/data
      sizeGB: 1
